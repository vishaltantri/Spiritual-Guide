<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpiritualGuide — Your Divine Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --gold-pale: #f5e9c8;
        --deep: #0d0a05;
        --dark: #1a1409;
        --mid: #2a1f0e;
        --surface: #1e1810;
        --surface2: #261d10;
        --text: #f0e6d0;
        --text-muted: #8a7a5e;
        --accent-hindu: #ff6b35;
        --accent-muslim: #2d8a6e;
        --accent-christian: #4a6fa5;
        --accent-sikh: #f4a521;
        --radius: 16px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--deep);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Animated mandala background ── */
      .bg-mandala {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(ellipse at 50% 0%, #2a1f0e 0%, #0d0a05 60%);
        overflow: hidden;
      }
      .bg-mandala::before {
        content: "";
        position: absolute;
        width: 900px;
        height: 900px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(201, 168, 76, 0.06) 0%,
          transparent 70%
        );
        border-radius: 50%;
        animation: breathe 8s ease-in-out infinite;
      }
      .bg-mandala::after {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(201, 168, 76, 0.08);
        border-radius: 50%;
        animation: spin 60s linear infinite;
      }
      @keyframes breathe {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          transform: translate(-50%, -50%) scale(1.15);
        }
      }
      @keyframes spin {
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      /* Floating particles */
      .particle {
        position: fixed;
        width: 2px;
        height: 2px;
        background: var(--gold);
        border-radius: 50%;
        pointer-events: none;
        animation: float-up linear infinite;
        opacity: 0;
      }
      @keyframes float-up {
        0% {
          transform: translateY(100vh) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.3;
        }
        100% {
          transform: translateY(-10vh) translateX(20px);
          opacity: 0;
        }
      }

      /* ── Layout ── */
      #root {
        position: relative;
        z-index: 1;
      }

      .screen {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        animation: fadeIn 0.6s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Logo ── */
      .logo {
        font-family: "Cinzel", serif;
        font-size: 13px;
        letter-spacing: 0.4em;
        color: var(--gold);
        text-transform: uppercase;
        opacity: 0.8;
        margin-bottom: 8px;
      }
      .logo-icon {
        font-size: 42px;
        display: block;
        text-align: center;
        margin-bottom: 12px;
      }

      /* ── Onboarding ── */
      .onboard-wrap {
        width: 100%;
        max-width: 560px;
        text-align: center;
      }
      .onboard-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(36px, 7vw, 56px);
        font-weight: 300;
        line-height: 1.1;
        color: var(--text);
        margin-bottom: 8px;
      }
      .onboard-title em {
        font-style: italic;
        color: var(--gold-light);
      }
      .onboard-sub {
        font-size: 15px;
        color: var(--text-muted);
        margin-bottom: 40px;
        font-weight: 300;
      }

      .step-indicator {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 32px;
      }
      .step-dot {
        width: 28px;
        height: 3px;
        background: var(--mid);
        border-radius: 2px;
        transition: background 0.4s;
      }
      .step-dot.active {
        background: var(--gold);
      }

      .step-label {
        font-size: 11px;
        letter-spacing: 0.3em;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 20px;
      }

      .cards-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 28px;
      }
      .cards-grid.cols-3 {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .option-card {
        background: var(--surface);
        border: 1.5px solid rgba(201, 168, 76, 0.15);
        border-radius: var(--radius);
        padding: 20px 16px;
        cursor: pointer;
        transition: all 0.25s;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .option-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(201, 168, 76, 0.08),
          transparent
        );
        opacity: 0;
        transition: opacity 0.25s;
      }
      .option-card:hover::before {
        opacity: 1;
      }
      .option-card:hover {
        border-color: rgba(201, 168, 76, 0.4);
        transform: translateY(-2px);
      }
      .option-card.selected {
        border-color: var(--gold);
        background: rgba(201, 168, 76, 0.12);
      }
      .option-card.selected::before {
        opacity: 1;
      }
      .card-icon {
        font-size: 28px;
        margin-bottom: 8px;
        display: block;
      }
      .card-label {
        font-family: "Cormorant Garamond", serif;
        font-size: 17px;
        font-weight: 600;
        color: var(--text);
      }
      .card-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Religion cards with accent colors */
      .option-card[data-rel="Hindu"].selected {
        border-color: var(--accent-hindu);
        background: rgba(255, 107, 53, 0.1);
      }
      .option-card[data-rel="Muslim"].selected {
        border-color: var(--accent-muslim);
        background: rgba(45, 138, 110, 0.1);
      }
      .option-card[data-rel="Christian"].selected {
        border-color: var(--accent-christian);
        background: rgba(74, 111, 165, 0.1);
      }
      .option-card[data-rel="Sikh"].selected {
        border-color: var(--accent-sikh);
        background: rgba(244, 165, 33, 0.1);
      }

      /* ── API key input ── */
      .api-section {
        background: var(--surface);
        border: 1px solid rgba(201, 168, 76, 0.2);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 24px;
        text-align: left;
      }
      .api-section label {
        font-size: 11px;
        letter-spacing: 0.25em;
        color: var(--gold);
        text-transform: uppercase;
        display: block;
        margin-bottom: 10px;
      }
      .api-section input {
        width: 100%;
        background: var(--mid);
        border: 1px solid rgba(201, 168, 76, 0.2);
        border-radius: 10px;
        padding: 12px 16px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      .api-section input:focus {
        border-color: var(--gold);
      }
      .api-section input::placeholder {
        color: var(--text-muted);
      }
      .api-note {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 8px;
      }
      .api-note a {
        color: var(--gold);
        text-decoration: none;
      }

      /* ── Button ── */
      .btn-primary {
        width: 100%;
        background: linear-gradient(135deg, var(--gold), #a87c2a);
        color: var(--deep);
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-family: "Cinzel", serif;
        font-size: 13px;
        letter-spacing: 0.2em;
        cursor: pointer;
        transition: all 0.25s;
        font-weight: 600;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 32px rgba(201, 168, 76, 0.3);
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .btn-back {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 13px;
        cursor: pointer;
        margin-top: 16px;
        font-family: "DM Sans", sans-serif;
        transition: color 0.2s;
      }
      .btn-back:hover {
        color: var(--text);
      }

      /* ── Dashboard ── */
      .dashboard {
        width: 100%;
        max-width: 700px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 0;
      }

      .dash-header {
        padding: 20px 24px 16px;
        border-bottom: 1px solid rgba(201, 168, 76, 0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dash-user {
        font-family: "Cormorant Garamond", serif;
        font-size: 20px;
        font-weight: 300;
      }
      .dash-user span {
        color: var(--gold-light);
        font-style: italic;
      }
      .dash-rel-badge {
        font-size: 10px;
        letter-spacing: 0.25em;
        padding: 5px 12px;
        border-radius: 20px;
        border: 1px solid;
        text-transform: uppercase;
      }

      .dash-body {
        padding: 24px;
        flex: 1;
        overflow-y: auto;
      }

      /* Daily card */
      .daily-card {
        background: var(--surface);
        border-radius: 20px;
        padding: 28px;
        margin-bottom: 24px;
        border: 1px solid rgba(201, 168, 76, 0.2);
        position: relative;
        overflow: hidden;
      }
      .daily-card::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(201, 168, 76, 0.08) 0%,
          transparent 70%
        );
        border-radius: 50%;
        transform: translate(40%, -40%);
      }
      .daily-label {
        font-size: 10px;
        letter-spacing: 0.35em;
        color: var(--gold);
        text-transform: uppercase;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .daily-label::before {
        content: "✦";
      }
      .daily-verse {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(18px, 3vw, 22px);
        font-style: italic;
        font-weight: 300;
        line-height: 1.6;
        color: var(--gold-pale);
        margin-bottom: 16px;
        border-left: 2px solid var(--gold);
        padding-left: 16px;
      }
      .daily-source {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 16px;
      }
      .daily-explanation {
        font-size: 14px;
        color: var(--text);
        line-height: 1.7;
        font-weight: 300;
      }
      .daily-loading {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        font-size: 14px;
        padding: 20px 0;
      }
      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(201, 168, 76, 0.2);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin2 0.8s linear infinite;
      }
      @keyframes spin2 {
        to {
          transform: rotate(360deg);
        }
      }

      /* Nav tabs */
      .dash-nav {
        display: flex;
        border-bottom: 1px solid rgba(201, 168, 76, 0.1);
        padding: 0 24px;
      }
      .nav-tab {
        padding: 14px 20px;
        font-size: 13px;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.25s;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
        font-family: "DM Sans", sans-serif;
      }
      .nav-tab.active {
        color: var(--gold);
        border-bottom-color: var(--gold);
      }
      .nav-tab:hover {
        color: var(--text);
      }

      /* ── Chat ── */
      .chat-wrap {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 160px);
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scrollbar-width: thin;
        scrollbar-color: var(--mid) transparent;
      }

      .msg {
        display: flex;
        gap: 12px;
        animation: msgIn 0.3s ease;
      }
      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg.user {
        flex-direction: row-reverse;
      }

      .msg-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
        border: 1px solid rgba(201, 168, 76, 0.3);
        background: var(--surface);
      }
      .msg-bubble {
        max-width: 75%;
        padding: 14px 18px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.65;
        font-weight: 300;
      }
      .msg.bot .msg-bubble {
        background: var(--surface2);
        border: 1px solid rgba(201, 168, 76, 0.12);
        border-bottom-left-radius: 4px;
        color: var(--text);
      }
      .msg.user .msg-bubble {
        background: linear-gradient(
          135deg,
          rgba(201, 168, 76, 0.25),
          rgba(201, 168, 76, 0.12)
        );
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-bottom-right-radius: 4px;
        color: var(--text);
      }
      .msg-source {
        font-size: 11px;
        color: var(--gold);
        margin-top: 8px;
        letter-spacing: 0.05em;
      }

      /* Chat input */
      .chat-input-area {
        padding: 16px 0 8px;
        border-top: 1px solid rgba(201, 168, 76, 0.1);
      }
      .chat-input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .chat-textarea {
        flex: 1;
        background: var(--surface);
        border: 1.5px solid rgba(201, 168, 76, 0.2);
        border-radius: 14px;
        padding: 12px 16px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        resize: none;
        outline: none;
        min-height: 48px;
        max-height: 120px;
        transition: border-color 0.2s;
        line-height: 1.5;
      }
      .chat-textarea:focus {
        border-color: var(--gold);
      }
      .chat-textarea::placeholder {
        color: var(--text-muted);
      }

      .icon-btn {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        border: 1.5px solid rgba(201, 168, 76, 0.25);
        background: var(--surface);
        color: var(--gold);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .icon-btn:hover {
        background: rgba(201, 168, 76, 0.1);
        border-color: var(--gold);
      }
      .icon-btn.send {
        background: linear-gradient(135deg, var(--gold), #a87c2a);
        border-color: transparent;
        color: var(--deep);
      }
      .icon-btn.send:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 16px rgba(201, 168, 76, 0.3);
      }
      .icon-btn.recording {
        background: rgba(220, 50, 50, 0.2);
        border-color: #dc3232;
        color: #dc3232;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      .voice-hint {
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        margin-top: 8px;
        letter-spacing: 0.05em;
      }

      /* Typing indicator */
      .typing {
        display: flex;
        gap: 4px;
        padding: 4px 0;
      }
      .typing span {
        width: 6px;
        height: 6px;
        background: var(--gold);
        border-radius: 50%;
        animation: bounce 1.2s ease-in-out infinite;
        opacity: 0.5;
      }
      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }

      /* Profile card */
      .profile-card {
        background: var(--surface);
        border: 1px solid rgba(201, 168, 76, 0.15);
        border-radius: 20px;
        padding: 24px;
        margin-bottom: 16px;
      }
      .profile-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .profile-row:last-child {
        border-bottom: none;
      }
      .profile-key {
        font-size: 12px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
      }
      .profile-val {
        font-family: "Cormorant Garamond", serif;
        font-size: 17px;
        color: var(--gold-light);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--mid);
        border-radius: 2px;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .cards-grid {
          grid-template-columns: 1fr 1fr;
        }
        .cards-grid.cols-3 {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Animated background -->
    <div class="bg-mandala"></div>

    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

            },
          ],
        },
        Sikh: {
          icon: "☬",
          color: "#f4a521",
          texts: ["Guru Granth Sahib", "Nitnem"],
          verses: [
            {
              text: "There is but One God. His name is Truth. He is the Creator, without fear, without hatred, immortal, self-existent.",
              source: "Guru Granth Sahib — Mool Mantar",
            },
            {
              text: "Even kings and emperors with heaps of wealth and vast dominion cannot compare with an ant filled with the love of God.",
              source: "Guru Granth Sahib",
            },
            {
              text: "One who claims to be a Sikh of the Guru must rise in the early morning and meditate on the Lord's name.",
              source: "Guru Granth Sahib",
            },
            {
              text: "Do not be angry at anyone; search your own faults. The world is a garden; I am the gardener within.",
              source: "Guru Granth Sahib",
            },
            {
              text: "Serve the Lord; join the congregation of the holy. Give up selfishness, and you shall find peace.",
              source: "Guru Granth Sahib",
            },
          ],
        },
      };

      const PROFESSIONS = [
        { label: "Student", icon: "📚", sub: "Learning & growth" },
        { label: "Professional", icon: "💼", sub: "Career & work" },
        { label: "Homemaker", icon: "🏡", sub: "Family & home" },
        { label: "Entrepreneur", icon: "🚀", sub: "Business & vision" },
        { label: "Artist", icon: "🎨", sub: "Creativity & expression" },
        { label: "Other", icon: "✨", sub: "My own path" },
      ];

      const AGE_GROUPS = [
        { label: "Teen", icon: "🌱", sub: "13–19" },
        { label: "Young Adult", icon: "🌿", sub: "20–35" },
        { label: "Adult", icon: "🌳", sub: "36–55" },
        { label: "Senior", icon: "🌲", sub: "55+" },
      ];

      const GOALS = [
        { label: "Peace of Mind", icon: "🕊️", sub: "Calm & stillness" },
        { label: "Career Guidance", icon: "🎯", sub: "Direction & purpose" },
        { label: "Relationships", icon: "💞", sub: "Love & connection" },
        { label: "Spiritual Growth", icon: "🌟", sub: "Deeper faith" },
      ];

      async function callAI(apiKey, prompt) {
        const res = await fetch(
          "https://api.groq.com/openai/v1/chat/completions",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + apiKey,
            },
            body: JSON.stringify({
              model: "llama-3.3-70b-versatile", // ✅ UPDATED MODEL
              messages: [{ role: "user", content: prompt }],
              temperature: 0.7,
            }),
          },
        );

        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }

        const data = await res.json();
        return data.choices[0].message.content;
      }

      function buildDailyPrompt(profile, verse) {
        return `You are a compassionate spiritual guide.
User profile:
- Religion: ${profile.religion}
- Profession: ${profile.profession}
- Age group: ${profile.ageGroup}
- Spiritual goal: ${profile.goal}

Today's scripture verse (${verse.source}):
"${verse.text}"

Write a warm, personal daily reflection (3–4 sentences) connecting this verse to their life as a ${profile.profession} seeking ${profile.goal}. Be encouraging, grounded, and specific. End with one practical action they can take today.`;
      }

      function buildChatPrompt(profile, userMsg, history) {
        const rel = profile.religion;
        const scriptures = SCRIPTURES[rel]?.texts.join(", ") || "sacred texts";
        const historyText = history
          .slice(-6)
          .map((m) => `${m.role === "user" ? "User" : "Guide"}: ${m.text}`)
          .join("\n");
        return `You are a wise, compassionate spiritual guide for a ${rel} ${profile.profession} (${profile.ageGroup}) seeking ${profile.goal}.
Draw your answers from ${scriptures}. Reference specific verses or teachings when relevant. Be warm, personal, and non-judgmental.
If the question is unrelated to spirituality or personal guidance, gently steer back. Always end with a relevant scripture reference.

Conversation so far:
${historyText}

User: ${userMsg}
Guide:`;
      }

      /* ── Components ── */

      function Particles() {
        useEffect(() => {
          const count = 12;
          const container = document.querySelector(".bg-mandala");
          const particles = [];
          for (let i = 0; i < count; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = 8 + Math.random() * 12 + "s";
            p.style.animationDelay = Math.random() * 10 + "s";
            p.style.width = p.style.height = 1 + Math.random() * 2 + "px";
            container.appendChild(p);
            particles.push(p);
          }
          return () => particles.forEach((p) => p.remove());
        }, []);
        return null;
      }

      function OptionCard({ icon, label, sub, selected, onClick, dataRel }) {
        return (
          <div
            className={`option-card${selected ? " selected" : ""}`}
            data-rel={dataRel}
            onClick={onClick}
          >
            <span className="card-icon">{icon}</span>
            <div className="card-label">{label}</div>
            {sub && <div className="card-sub">{sub}</div>}
          </div>
        );
      }

      /* ── Onboarding ── */
      function Onboarding({ onComplete }) {
        const [step, setStep] = useState(0);
        const [profile, setProfile] = useState({
          religion: "",
          profession: "",
          ageGroup: "",
          goal: "",
        });
        const [apiKey, setApiKey] = useState("");

        const steps = [
          {
            label: "Your Faith",
            title: (
              <>
                <em>Your</em> Sacred Path
              </>
            ),
            sub: "Select the tradition that guides your heart",
            field: "religion",
            options: Object.entries(SCRIPTURES).map(([k, v]) => ({
              label: k,
              icon: v.icon,
              sub: v.texts.join(" · "),
              dataRel: k,
            })),
            cols: 2,
          },
          {
            label: "Your Life",
            title: (
              <>
                How Do You <em>Walk</em> This World?
              </>
            ),
            sub: "Your calling shapes the guidance you receive",
            field: "profession",
            options: PROFESSIONS,
            cols: 3,
          },
          {
            label: "Your Season",
            title: (
              <>
                Where Are You <em>Now?</em>
              </>
            ),
            sub: "Each season of life holds its own wisdom",
            field: "ageGroup",
            options: AGE_GROUPS,
            cols: 2,
          },
          {
            label: "Your Seeking",
            title: (
              <>
                What Does Your <em>Soul</em> Seek?
              </>
            ),
            sub: "Your intention guides the teachings that find you",
            field: "goal",
            options: GOALS,
            cols: 2,
          },
        ];

        const cur = steps[step];
        const canNext = !!profile[cur.field];
        const isLast = step === steps.length - 1;

        function handleNext() {
          if (isLast) {
            onComplete({ ...profile, apiKey });
          } else {
            setStep((s) => s + 1);
          }
        }

        return (
          <div className="screen">
            <Particles />
            <div className="onboard-wrap">
              <div className="logo-icon">🌸</div>
              <div className="logo">SpiritualGuide</div>

              <div className="step-indicator" style={{ marginTop: 24 }}>
                {steps.map((_, i) => (
                  <div
                    key={i}
                    className={`step-dot${i <= step ? " active" : ""}`}
                  />
                ))}
              </div>

              <div className="step-label">{cur.label}</div>
              <h1 className="onboard-title">{cur.title}</h1>
              <p className="onboard-sub">{cur.sub}</p>

              <div className={`cards-grid${cur.cols === 3 ? " cols-3" : ""}`}>
                {cur.options.map((opt) => (
                  <OptionCard
                    key={opt.label}
                    icon={opt.icon}
                    label={opt.label}
                    sub={opt.sub}
                    dataRel={opt.dataRel}
                    selected={profile[cur.field] === opt.label}
                    onClick={() =>
                      setProfile((p) => ({ ...p, [cur.field]: opt.label }))
                    }
                  />
                ))}
              </div>

              {isLast && (
                <div className="api-section">
                  <label>🔑 🔑 Groq API Key</label>
                  <input
                    type="password"
                    placeholder="AIza..."
                    value={apiKey}
                    onChange={(e) => setApiKey(e.target.value)}
                  />
                  <div className="api-note">
                    Get a free key at{" "}
                    <a
                      href="https://console.groq.com"
                      target="_blank"
                      rel="noreferrer"
                    >
                      console.groq.com
                    </a>{" "}
                    · Your key stays in your browser only
                  </div>
                </div>
              )}

              <button
                className="btn-primary"
                disabled={!canNext || (isLast && !apiKey)}
                onClick={handleNext}
              >
                {isLast ? "Begin My Journey ✦" : "Continue →"}
              </button>

              {step > 0 && (
                <button
                  className="btn-back"
                  onClick={() => setStep((s) => s - 1)}
                >
                  ← Go back
                </button>
              )}
            </div>
          </div>
        );
      }

      /* ── Daily Card ── */
      function DailyCard({ profile }) {
        const [loading, setLoading] = useState(true);
        const [verse, setVerse] = useState(null);
        const [explanation, setExplanation] = useState("");
        const [error, setError] = useState("");

        useEffect(() => {
          const rel = profile.religion;
          const verses = SCRIPTURES[rel]?.verses || [];
          const today = new Date().toDateString();
          const idx =
            Math.abs([...today].reduce((a, c) => a + c.charCodeAt(0), 0)) %
            verses.length;
          const v = verses[idx];
          setVerse(v);

          callAI(profile.apiKey, buildDailyPrompt(profile, v))
            .then((text) => {
              setExplanation(text);
              setLoading(false);
            })
            .catch((e) => {
              setError(e.message);
              setLoading(false);
            });
        }, []);

        if (!verse) return null;
        const rel = SCRIPTURES[profile.religion];

        return (
          <div className="daily-card">
            <div className="daily-label" style={{ color: rel.color }}>
              Today's Guidance
            </div>
            <div className="daily-verse">"{verse.text}"</div>
            <div className="daily-source">— {verse.source}</div>
            {loading ? (
              <div className="daily-loading">
                <div className="spinner" />
                Seeking wisdom for you…
              </div>
            ) : error ? (
              <div style={{ color: "#dc3232", fontSize: 13 }}>⚠ {error}</div>
            ) : (
              <div className="daily-explanation">{explanation}</div>
            )}
          </div>
        );
      }

      /* ── Chat ── */
      function ChatTab({ profile }) {
        const [messages, setMessages] = useState([
          {
            role: "bot",
            text: `Namaste, and welcome. 🙏 I am your spiritual companion, drawing from the wisdom of the ${profile.religion} tradition — the ${SCRIPTURES[profile.religion]?.texts.join(", ")}.\n\nShare what is on your heart, and let us find guidance together.`,
          },
        ]);
        const [input, setInput] = useState("");
        const [loading, setLoading] = useState(false);
        const [recording, setRecording] = useState(false);
        const bottomRef = useRef();
        const recognitionRef = useRef(null);

        useEffect(() => {
          bottomRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [messages]);

        async function sendMessage(text) {
          if (!text.trim() || loading) return;
          const userMsg = { role: "user", text: text.trim() };
          setMessages((m) => [...m, userMsg]);
          setInput("");
          setLoading(true);

          try {
            const prompt = buildChatPrompt(profile, text.trim(), messages);
            const reply = await callAI(profile.apiKey, prompt);
            setMessages((m) => [...m, { role: "bot", text: reply }]);
          } catch (e) {
            setMessages((m) => [...m, { role: "bot", text: `⚠ ${e.message}` }]);
          }
          setLoading(false);
        }

        function handleVoice() {
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (!SR) {
            alert("Voice not supported in this browser. Try Chrome.");
            return;
          }

          if (recording) {
            recognitionRef.current?.stop();
            setRecording(false);
            return;
          }

          const rec = new SR();
          rec.lang = "en-US";
          rec.interimResults = false;
          rec.onresult = (e) => {
            const t = e.results[0][0].transcript;
            setInput(t);
            setRecording(false);
          };
          rec.onerror = () => setRecording(false);
          rec.onend = () => setRecording(false);
          recognitionRef.current = rec;
          rec.start();
          setRecording(true);
        }

        function handleKey(e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage(input);
          }
        }

        const rel = SCRIPTURES[profile.religion];

        return (
          <div className="chat-wrap">
            <div className="chat-messages">
              {messages.map((msg, i) => (
                <div key={i} className={`msg ${msg.role}`}>
                  <div className="msg-avatar">
                    {msg.role === "bot" ? rel.icon : "🧘"}
                  </div>
                  <div className="msg-bubble">
                    {msg.text.split("\n").map((line, j) => (
                      <span key={j}>
                        {line}
                        {j < msg.text.split("\n").length - 1 && <br />}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
              {loading && (
                <div className="msg bot">
                  <div className="msg-avatar">{rel.icon}</div>
                  <div className="msg-bubble">
                    <div className="typing">
                      <span />
                      <span />
                      <span />
                    </div>
                  </div>
                </div>
              )}
              <div ref={bottomRef} />
            </div>

            <div className="chat-input-area">
              <div className="chat-input-row">
                <textarea
                  className="chat-textarea"
                  placeholder="Ask anything… or speak your heart 🙏"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyDown={handleKey}
                  rows={1}
                />
                <button
                  className={`icon-btn${recording ? " recording" : ""}`}
                  onClick={handleVoice}
                  title={recording ? "Stop recording" : "Speak"}
                >
                  {recording ? "⏹" : "🎙"}
                </button>
                <button
                  className="icon-btn send"
                  onClick={() => sendMessage(input)}
                  disabled={!input.trim() || loading}
                  title="Send"
                >
                  ↑
                </button>
              </div>
              {recording && (
                <div className="voice-hint">
                  🔴 Listening… speak your question
                </div>
              )}
              {!recording && (
                <div className="voice-hint">
                  Press Enter to send · Shift+Enter for new line · 🎙 for voice
                </div>
              )}
            </div>
          </div>
        );
      }

      /* ── Profile tab ── */
      function ProfileTab({ profile, onReset }) {
        const rel = SCRIPTURES[profile.religion];
        return (
          <div>
            <div className="profile-card">
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ fontSize: 48, marginBottom: 8 }}>{rel.icon}</div>
                <div
                  style={{
                    fontFamily: "Cormorant Garamond",
                    fontSize: 24,
                    color: rel.color,
                  }}
                >
                  {profile.religion}
                </div>
                <div
                  style={{
                    fontSize: 12,
                    color: "var(--text-muted)",
                    marginTop: 4,
                  }}
                >
                  {rel.texts.join(" · ")}
                </div>
              </div>
              {[
                ["Profession", profile.profession],
                ["Age Group", profile.ageGroup],
                ["Seeking", profile.goal],
                ["Language", "English"],
              ].map(([k, v]) => (
                <div className="profile-row" key={k}>
                  <span className="profile-key">{k}</span>
                  <span className="profile-val">{v}</span>
                </div>
              ))}
            </div>
            <button
              className="btn-primary"
              style={{
                background: "var(--surface)",
                color: "var(--text-muted)",
                border: "1px solid rgba(201,168,76,0.2)",
              }}
              onClick={onReset}
            >
              Update My Profile
            </button>
          </div>
        );
      }

      /* ── Main Dashboard ── */
      function Dashboard({ profile, onReset }) {
        const [tab, setTab] = useState("daily");
        const rel = SCRIPTURES[profile.religion];

        const badgeStyle = {
          color: rel.color,
          borderColor: rel.color + "55",
        };

        return (
          <div
            className="screen"
            style={{ padding: 0, justifyContent: "flex-start" }}
          >
            <div className="dashboard">
              <div className="dash-header">
                <div>
                  <div
                    style={{
                      fontSize: 11,
                      letterSpacing: "0.2em",
                      color: "var(--text-muted)",
                      marginBottom: 4,
                      textTransform: "uppercase",
                    }}
                  >
                    Welcome back
                  </div>
                  <div className="dash-user">
                    Your <span>Spiritual</span> Journey
                  </div>
                </div>
                <div className="dash-rel-badge" style={badgeStyle}>
                  {rel.icon} {profile.religion}
                </div>
              </div>

              <div className="dash-nav">
                {[
                  { id: "daily", label: "✦ Daily" },
                  { id: "chat", label: "💬 Guide" },
                  { id: "profile", label: "👤 Profile" },
                ].map((t) => (
                  <button
                    key={t.id}
                    className={`nav-tab${tab === t.id ? " active" : ""}`}
                    onClick={() => setTab(t.id)}
                  >
                    {t.label}
                  </button>
                ))}
              </div>

              <div className="dash-body">
                {tab === "daily" && (
                  <>
                    <DailyCard profile={profile} />
                    <div
                      style={{
                        textAlign: "center",
                        color: "var(--text-muted)",
                        fontSize: 13,
                      }}
                    >
                      ✦ &nbsp;New wisdom awaits each day&nbsp; ✦
                    </div>
                  </>
                )}
                {tab === "chat" && <ChatTab profile={profile} />}
                {tab === "profile" && (
                  <ProfileTab profile={profile} onReset={onReset} />
                )}
              </div>
            </div>
          </div>
        );
      }

      /* ── App Root ── */
      function App() {
        const [profile, setProfile] = useState(() => {
          try {
            return JSON.parse(sessionStorage.getItem("sg_profile"));
          } catch {
            return null;
          }
        });

        function handleComplete(p) {
          sessionStorage.setItem("sg_profile", JSON.stringify(p));
          setProfile(p);
        }

        function handleReset() {
          sessionStorage.removeItem("sg_profile");
          setProfile(null);
        }

        return profile ? (
          <Dashboard profile={profile} onReset={handleReset} />
        ) : (
          <Onboarding onComplete={handleComplete} />
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
